              - paragraph [ref=e49]: My first real woodworking project — a flower pot stand
              - generic [ref=e50]:
                - generic [ref=e51]:
                  - text: Posted
                  - time [ref=e52]: Nov 30, 2021
                - link "Preview Image" [ref=e54] [cursor=pointer]:
                  - /url: /assets/flower-pot-stand/2020-08-23 14.42.57.jpg
                  - img "Preview Image" [ref=e55]
                - generic [ref=e56]:
                  - generic [ref=e57]:
                    - text: By
                    - emphasis [ref=e58]:
                      - link "Joost Oostdijk" [ref=e59] [cursor=pointer]:
                        - /url: https://github.com/joustava
                  - generic [ref=e61]:
                    - emphasis [ref=e62]: 1 min
                    - text: read
            - generic [ref=e63]:
              - paragraph [ref=e64]:
                - text: I never really got into a new hobby until I stepped into one wood working course at
                - link "Woodworking Academy" [ref=e65] [cursor=pointer]:
                  - /url: https://woodworkacademy.berlin/
                - text: "in August 2020. There I made my first real little project: a flower pot stand. Why start writing about it now? Just to keep a journal of sorts of what I have made and share it with the world (I guess)."
              - paragraph [ref=e66]: The flower pots are some cheap brand bought at an Edeka Supermarket in Berlin and had them already for a while before the academy, but no matter the price, I liked them because of their pastel colors which in the end suited the plain pine wood color.
              - paragraph [ref=e67]:
                - link "Flower pot stand side view without plants" [ref=e68]:
                  - /url: /assets/flower-pot-stand/2020-08-22 20.01.28.jpg
                  - img "Flower pot stand side view without plants" [ref=e69]
              - paragraph [ref=e70]:
                - text: To finish it off, the pots of course need to house some plants. I chose
                - link "succulents" [ref=e71] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Succulent_plant
                - text: as they require little upkeep, grow relatively slow and of course look very nice.
              - paragraph [ref=e72]:
                - link "Flower pot stand front view with plants" [ref=e73]:
                  - /url: /assets/flower-pot-stand/2020-08-22 21.02.25.jpg
                  - img "Flower pot stand front view with plants" [ref=e74]
              - paragraph [ref=e75]: The design of the flower pot stand is my own. The holes for the pots were pre-sawn with a jig saw and cut to precision with a router with the use of a template mounted on the wood with double sided tape. The holes sizes were made so that the pots would protrude as far as possible without touching the bottom shelve. The parts are glued and screwed together. The screws are mounted in pocket holes which are closed off with little wooden ‘corks’ glued into the holes.
              - paragraph [ref=e76]:
                - link "Flower pot stand side view with plants" [ref=e77]:
                  - /url: /assets/flower-pot-stand/2020-08-23 14.42.57.jpg
                  - img "Flower pot stand side view with plants" [ref=e78]
              - paragraph [ref=e79]: This was a really nice weekend project and only needs one pine board. If there is enough interest I will measure it and update this post with some rough design sketches. Currently the piece is adorning the office room of my lovely wife.
              - paragraph [ref=e80]:
                - link "Flower pot stand current use" [ref=e81]:
                  - /url: /assets/flower-pot-stand/2021-11-27 18.02.08.jpg
                  - img "Flower pot stand current use" [ref=e82]
              - paragraph [ref=e83]: Even though the wood has not been treated at all, its color has not faded much, only the original plants have been replaced by more energetic specimen.
